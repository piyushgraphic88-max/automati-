<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebStream Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #0f0f0f;
            --bg-side: #1a1a1a;
            --accent: #5e35b1;
            --accent-hover: #7e57c2;
            --timeline-bg: #121212;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        /* Timeline Range Styles */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .timeline-container {
            height: 200px;
            background: var(--timeline-bg);
            border-top: 1px solid #222;
        }

        .video-preview-area {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #video-element {
            max-height: 100%;
            max-width: 100%;
        }

        .tool-btn {
            @apply flex flex-col items-center justify-center p-3 rounded-lg transition-all hover:bg-white/5 text-xs gap-1;
        }
        
        .tool-btn.active {
            @apply bg-white/10 text-purple-400;
        }

        /* Message Overlay */
        #status-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #333;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- Loading/Installation Screen -->
    <div id="boot-screen">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold mb-2">WebStream Editor</h1>
            <p class="text-gray-400" id="boot-text">Ready to initialize engine</p>
        </div>
        <button id="install-btn" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 rounded-full font-semibold transition-transform active:scale-95">
            Install Video Engine
        </button>
        <div id="boot-loader" class="hidden flex flex-col items-center">
            <div class="spinner mb-4"></div>
            <p class="text-sm text-gray-500">Downloading WebAssembly cores (approx. 25MB)...</p>
        </div>
    </div>

    <!-- Main Editor Interface -->
    <div class="flex h-screen flex-col">
        <!-- Header -->
        <header class="h-14 border-b border-white/10 flex items-center justify-between px-6 bg-zinc-900">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded flex items-center justify-center">
                    <i class="fas fa-play text-xs"></i>
                </div>
                <span class="font-bold tracking-tight">WebStream Pro</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="export-btn" class="px-4 py-1.5 bg-purple-600 hover:bg-purple-700 rounded-md text-sm font-medium flex items-center gap-2">
                    <i class="fas fa-file-export"></i> Export
                </button>
            </div>
        </header>

        <!-- Editor Body -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-20 border-r border-white/5 bg-zinc-900 flex flex-col py-4 gap-2">
                <button class="tool-btn active">
                    <i class="fas fa-folder-open text-xl"></i>
                    <span>Media</span>
                </button>
                <button class="tool-btn">
                    <i class="fas fa-cut text-xl"></i>
                    <span>Edit</span>
                </button>
                <button class="tool-btn">
                    <i class="fas fa-font text-xl"></i>
                    <span>Text</span>
                </button>
                <button class="tool-btn">
                    <i class="fas fa-music text-xl"></i>
                    <span>Audio</span>
                </button>
                <div class="mt-auto border-t border-white/5 pt-4">
                    <button class="tool-btn opacity-50">
                        <i class="fas fa-cog text-xl"></i>
                        <span>Settings</span>
                    </button>
                </div>
            </aside>

            <!-- Library / Asset Panel -->
            <aside class="w-72 bg-zinc-900/50 border-r border-white/5 p-4 flex flex-col">
                <h3 class="text-sm font-semibold mb-4 text-gray-300">YOUR MEDIA</h3>
                <div id="media-dropzone" class="border-2 border-dashed border-white/10 rounded-xl flex-1 flex flex-col items-center justify-center p-6 text-center hover:border-purple-500/50 transition-colors cursor-pointer group">
                    <input type="file" id="video-input" class="hidden" accept="video/*">
                    <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <i class="fas fa-plus text-gray-400"></i>
                    </div>
                    <p class="text-xs text-gray-500 font-medium leading-relaxed">Click to upload or drag & drop video</p>
                </div>
                <div id="media-list" class="mt-4 hidden space-y-2 overflow-y-auto custom-scroll">
                    <!-- Media Items will appear here -->
                </div>
            </aside>

            <!-- Preview & Controls -->
            <main class="flex-1 flex flex-col">
                <div class="flex-1 video-preview-area">
                    <video id="video-element" preload="auto"></video>
                    
                    <div id="status-overlay">
                        <p id="status-text" class="text-sm font-medium">Processing...</p>
                    </div>

                    <!-- Floating Player Controls -->
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900/80 backdrop-blur-md px-6 py-2 rounded-full flex items-center gap-6 border border-white/10 shadow-2xl">
                        <button id="btn-backward" class="hover:text-purple-400 transition-colors"><i class="fas fa-backward"></i></button>
                        <button id="btn-play-pause" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:bg-purple-400 transition-colors">
                            <i class="fas fa-play pl-1"></i>
                        </button>
                        <button id="btn-forward" class="hover:text-purple-400 transition-colors"><i class="fas fa-forward"></i></button>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="timeline-container p-4 flex flex-col">
                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="flex gap-4">
                            <button id="btn-trim" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded flex items-center gap-2 border border-white/5">
                                <i class="fas fa-scissors text-purple-400"></i> Trim to Selection
                            </button>
                            <button id="btn-reset" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded flex items-center gap-2 border border-white/5">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>
                        <div class="text-xs font-mono text-gray-400">
                            <span id="current-time">00:00</span> / <span id="duration-time">00:00</span>
                        </div>
                    </div>

                    <!-- Range Selector / Timeline UI -->
                    <div class="relative h-20 bg-zinc-800/30 rounded-lg border border-white/5 overflow-hidden">
                        <div id="timeline-scrub" class="h-full bg-purple-500/10 absolute left-0 top-0 transition-all pointer-events-none" style="width: 0%"></div>
                        
                        <!-- Trim Markers -->
                        <div class="absolute inset-x-0 bottom-4 px-2">
                            <div class="flex flex-col gap-2">
                                <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                                    <span>Start: <span id="start-val">0</span>s</span>
                                    <span>End: <span id="end-val">0</span>s</span>
                                </div>
                                <div class="relative h-2">
                                    <input type="range" id="trim-start" step="0.1" value="0" class="absolute z-10">
                                    <input type="range" id="trim-end" step="0.1" value="100" class="absolute z-20">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Fake Waveform/Frame strip visual -->
                        <div class="absolute inset-0 flex items-center justify-around opacity-20 pointer-events-none">
                            <div class="w-1 h-8 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-12 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-6 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-10 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-8 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-14 bg-gray-500 rounded-full"></div>
                            <div class="w-1 h-10 bg-gray-500 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Note: FFmpeg.wasm requires special cross-origin headers or a proxy, 
         but for this demo we use the standard UMD build -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // State
        let currentFile = null;
        let isLoaded = false;
        let isPlaying = false;

        // Elements
        const bootScreen = document.getElementById('boot-screen');
        const installBtn = document.getElementById('install-btn');
        const bootLoader = document.getElementById('boot-loader');
        const videoInput = document.getElementById('video-input');
        const mediaDropzone = document.getElementById('media-dropzone');
        const videoElement = document.getElementById('video-element');
        const playPauseBtn = document.getElementById('btn-play-pause');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationTimeDisplay = document.getElementById('duration-time');
        const trimStart = document.getElementById('trim-start');
        const trimEnd = document.getElementById('trim-end');
        const startVal = document.getElementById('start-val');
        const endVal = document.getElementById('end-val');
        const statusOverlay = document.getElementById('status-overlay');
        const statusText = document.getElementById('status-text');
        const exportBtn = document.getElementById('export-btn');
        const trimBtn = document.getElementById('btn-trim');

        // 1. Installation Sequence
        installBtn.addEventListener('click', async () => {
            installBtn.classList.add('hidden');
            bootLoader.classList.remove('hidden');
            document.getElementById('boot-text').innerText = "Installing core components...";

            try {
                await ffmpeg.load();
                isLoaded = true;
                bootScreen.style.opacity = '0';
                setTimeout(() => bootScreen.style.display = 'none', 500);
            } catch (e) {
                console.error(e);
                alert("Failed to load FFmpeg. Browsers like Chrome or Edge are recommended. Ensure SharedArrayBuffer is supported.");
            }
        });

        // 2. Media Loading
        mediaDropzone.addEventListener('click', () => videoInput.click());
        
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            currentFile = file;
            const url = URL.createObjectURL(file);
            videoElement.src = url;
            
            // Show file in "Library"
            const mediaList = document.getElementById('media-list');
            mediaDropzone.classList.add('hidden');
            mediaList.classList.remove('hidden');
            mediaList.innerHTML = `
                <div class="p-3 bg-white/5 rounded-lg border border-white/10 flex items-center gap-3">
                    <div class="w-12 h-12 bg-black rounded flex items-center justify-center overflow-hidden">
                        <i class="fas fa-video text-gray-600"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-semibold truncate">${file.name}</p>
                        <p class="text-[10px] text-gray-500">${(file.size / (1024 * 1024)).toFixed(1)} MB</p>
                    </div>
                </div>
            `;

            videoElement.onloadedmetadata = () => {
                durationTimeDisplay.innerText = formatTime(videoElement.duration);
                trimStart.max = videoElement.duration;
                trimEnd.max = videoElement.duration;
                trimEnd.value = videoElement.duration;
                updateRangeDisplays();
            };
        }

        // 3. Player Controls
        playPauseBtn.addEventListener('click', () => {
            if (videoElement.paused) {
                videoElement.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                videoElement.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play pl-1"></i>';
            }
        });

        videoElement.addEventListener('timeupdate', () => {
            currentTimeDisplay.innerText = formatTime(videoElement.currentTime);
            const progress = (videoElement.currentTime / videoElement.duration) * 100;
            document.getElementById('timeline-scrub').style.width = `${progress}%`;
            
            // Auto-pause if outside trim area
            if (videoElement.currentTime > parseFloat(trimEnd.value)) {
                videoElement.currentTime = parseFloat(trimStart.value);
            }
        });

        // 4. Timeline Logic
        function updateRangeDisplays() {
            startVal.innerText = parseFloat(trimStart.value).toFixed(1);
            endVal.innerText = parseFloat(trimEnd.value).toFixed(1);
        }

        trimStart.addEventListener('input', () => {
            if (parseFloat(trimStart.value) >= parseFloat(trimEnd.value)) {
                trimStart.value = parseFloat(trimEnd.value) - 0.1;
            }
            videoElement.currentTime = trimStart.value;
            updateRangeDisplays();
        });

        trimEnd.addEventListener('input', () => {
            if (parseFloat(trimEnd.value) <= parseFloat(trimStart.value)) {
                trimEnd.value = parseFloat(trimStart.value) + 0.1;
            }
            videoElement.currentTime = trimEnd.value;
            updateRangeDisplays();
        });

        // 5. Video Processing (FFmpeg)
        async function processVideo(action) {
            if (!currentFile) return showStatus("No video loaded!", 2000);
            
            const start = trimStart.value;
            const end = trimEnd.value;
            const duration = end - start;

            showStatus("Processing Video... Please wait.", 0);
            
            try {
                // Write original file to virtual FS
                ffmpeg.FS('writeFile', 'input_video', await fetchFile(currentFile));

                // Execute Trim
                // -ss (start), -t (duration), -c copy (fast trim without re-encoding)
                await ffmpeg.run('-i', 'input_video', '-ss', `${start}`, '-t', `${duration}`, '-c', 'copy', 'output.mp4');

                // Read Result
                const data = ffmpeg.FS('readFile', 'output.mp4');
                
                // Trigger Download
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                const a = document.createElement('a');
                a.href = url;
                a.download = `edited_${currentFile.name}`;
                a.click();

                showStatus("Export Successful!", 3000);
            } catch (error) {
                console.error(error);
                showStatus("Error during processing.", 3000);
            }
        }

        exportBtn.addEventListener('click', () => processVideo('export'));
        trimBtn.addEventListener('click', () => processVideo('trim'));

        // Utility
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function showStatus(text, duration) {
            statusOverlay.style.display = 'block';
            statusText.innerText = text;
            if (duration > 0) {
                setTimeout(() => {
                    statusOverlay.style.display = 'none';
                }, duration);
            }
        }

        // Navigation controls
        document.getElementById('btn-forward').addEventListener('click', () => videoElement.currentTime += 5);
        document.getElementById('btn-backward').addEventListener('click', () => videoElement.currentTime -= 5);
        document.getElementById('btn-reset').addEventListener('click', () => {
            trimStart.value = 0;
            trimEnd.value = videoElement.duration;
            updateRangeDisplays();
        });
    </script>
</body>
</html>
