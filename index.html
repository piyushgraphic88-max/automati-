<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Video Editor (Single File)</title>
    
    <!-- CSS STYLES -->
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #0078d4;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        #status-pill {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #444;
            margin-bottom: 10px;
        }

        .video-preview {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { background: #555; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.8; }

        .timeline-info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #progress-container {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            display: none;
            margin: 15px 0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.2s;
        }

        #download-link {
            display: block;
            text-align: center;
            background: #4caf50;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>JS Video Editor</h1>
            <div id="status-pill">Initializing FFmpeg...</div>
        </div>

        <input type="file" id="uploader" accept="video/*" style="margin-bottom: 20px;">

        <video id="player" class="video-preview" controls></video>

        <div class="timeline-info">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Start: <b id="start-label">0.00</b>s</span>
                <span>Current: <b id="current-label">0.00</b>s</span>
                <span>End: <b id="end-label">0.00</b>s</span>
            </div>
            <div class="controls">
                <button id="btn-start">Set Start Point</button>
                <button id="btn-end">Set End Point</button>
            </div>
        </div>

        <button id="btn-export" style="width: 100%; font-size: 1.1rem;" disabled>Export Trimmed Clip</button>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p id="progress-text" style="text-align: center; font-size: 0.9rem;"></p>

        <a id="download-link">Download Processed Video</a>
    </div>

    <!-- FFmpeg.wasm Scripts -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;

        let ffmpeg = null;
        let startTime = 0;
        let endTime = 0;
        let videoFile = null;

        // Elements
        const player = document.getElementById('player');
        const uploader = document.getElementById('uploader');
        const statusPill = document.getElementById('status-pill');
        const startLabel = document.getElementById('start-label');
        const currentLabel = document.getElementById('current-label');
        const endLabel = document.getElementById('end-label');
        const exportBtn = document.getElementById('btn-export');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const progressText = document.getElementById('progress-text');
        const downloadLink = document.getElementById('download-link');

        // Load FFmpeg on startup
        (async () => {
            try {
                ffmpeg = new FFmpeg();
                
                ffmpeg.on('log', ({ message }) => console.log(message));
                
                ffmpeg.on('progress', ({ progress }) => {
                    const perc = Math.round(progress * 100);
                    progressBar.style.width = perc + '%';
                    progressText.innerText = `Processing: ${perc}%`;
                });

                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });

                statusPill.innerText = "FFmpeg Ready";
                statusPill.style.background = "#2e7d32";
            } catch (err) {
                statusPill.innerText = "Header Error: See Console";
                statusPill.style.background = "#c62828";
                console.error(err);
            }
        })();

        // Handle File Upload
        uploader.addEventListener('change', (e) => {
            videoFile = e.target.files[0];
            if (!videoFile) return;

            const url = URL.createObjectURL(videoFile);
            player.src = url;
            
            player.onloadedmetadata = () => {
                endTime = player.duration;
                endLabel.innerText = endTime.toFixed(2);
                exportBtn.disabled = false;
            };
        });

        // Update Current Time Display
        player.addEventListener('timeupdate', () => {
            currentLabel.innerText = player.currentTime.toFixed(2);
        });

        // Set Trim Points
        document.getElementById('btn-start').onclick = () => {
            startTime = player.currentTime;
            startLabel.innerText = startTime.toFixed(2);
        };

        document.getElementById('btn-end').onclick = () => {
            endTime = player.currentTime;
            endLabel.innerText = endTime.toFixed(2);
        };

        // Export/Process Function
        exportBtn.onclick = async () => {
            if (!videoFile || !ffmpeg) return;

            // Reset UI
            exportBtn.disabled = true;
            progressContainer.style.display = 'block';
            downloadLink.style.display = 'none';

            const inputName = 'input_video';
            const outputName = 'output_video.mp4';

            // Write file to virtual FS
            await ffmpeg.writeFile(inputName, await fetchFile(videoFile));

            // Execute FFmpeg Command
            // -ss: Start time
            // -to: End time
            // -c:v libx264: encode to h264
            // -preset ultrafast: prioritize speed over file size
            await ffmpeg.exec([
                '-ss', startTime.toString(),
                '-to', endTime.toString(),
                '-i', inputName,
                '-c:v', 'libx264', 
                '-preset', 'ultrafast',
                '-c:a', 'copy',
                outputName
            ]);

            // Read result
            const data = await ffmpeg.readFile(outputName);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            
            // Cleanup UI
            progressText.innerText = "Export Complete!";
            exportBtn.disabled = false;
            
            // Create Download
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = 'trimmed_video.mp4';
            downloadLink.style.display = 'block';
        };
    </script>
</body>
</html>
